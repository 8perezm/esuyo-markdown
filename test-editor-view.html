<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View vs Edit Mode Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.1.0/lib/index.umd.js"></script>
    <style>
        /* Load the actual CSS files */
    </style>
    <!-- Load CSS directly via link tags -->
    <link rel="stylesheet" href="src/markdown-theme.css">
    <link rel="stylesheet" href="src/style.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0c;
            font-family: var(--font-sans, 'Inter', sans-serif);
        }

        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .panel {
            background: #0f0f11;
            border: 1px solid #2c2e33;
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            background: #1a1b1e;
            border-bottom: 1px solid #2c2e33;
            font-weight: 600;
            color: #e0e0e0;
            font-size: 14px;
        }

        .panel-content {
            padding: 0;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* Simulate Quill editor structure */
        .ql-editor {
            padding: 32px 48px !important;
            max-width: 800px;
            margin: 0 auto;
            min-height: 200px;
        }

        .ql-container {
            font-family: inherit;
        }

        .ql-toolbar {
            display: none;
        }

        /* Hide Quill's default toolbar for this test */
    </style>
</head>

<body>
    <h1 style="text-align: center; color: #e0e0e0; margin-bottom: 20px;">View Mode vs Edit Mode Comparison</h1>
    <div class="comparison">
        <div class="panel">
            <div class="panel-header">📖 View Mode (markdown-body)</div>
            <div class="panel-content">
                <div class="markdown-body" id="view-mode"></div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">✏️ Edit Mode (ql-editor)</div>
            <div class="panel-content">
                <div class="ql-editor ql-blank" id="edit-mode" contenteditable="true"></div>
            </div>
        </div>
    </div>

    <script>
        // Configure marked (no syntax highlighting for simplicity)
        marked.setOptions({
            gfm: true,
            breaks: false
        });

        const readmeMd = `# Esuyo Gateway

A complete platform for routing, monitoring, and analysing LLM API usage across multiple providers. Consists of two applications:

| Application | Description | Port |
|---|---|---|
| [**Gateway**](./gateway/) | Multi-provider LLM gateway with auth, logging, cost tracking, rate limiting, and alerts | \`::3000\` |
| [**Dashboard**](./dashboard/) | Real-time analytics UI with charts, user drill-downs, raw logs, and CSV export | \`::3001\` |

## Architecture

\`\`\`
Client apps (your services)
        │
        ▼
┌───────────────┐     ┌───────────────┐
│  LLM Gateway  │────▶│  AI Providers │
│  (Hono :3000) │     │  OpenAI       │
│               │◀────│  Anthropic    │
│  - Auth       │     │  OpenRouter   │
│  - Rate limit │     │  Ollama       │
│  - Cost calc  │     └───────────────┘
│  - Alerts     │
└───────┬───────┘
        │ writes
        ▼
┌───────────────┐     ┌───────────────┐
│  PostgreSQL   │◀────│  Dashboard    │
│  (usage_logs) │     │  (Next.js)    │
└───────────────┘     └───────────────┘
\`\`\`

## Development

> **Docker is for production only.** During development, run each app directly with \`npm run dev\` — no containers needed.

### Local development

\`\`\`bash
# 1. Start PostgreSQL locally (e.g. via Docker or a managed instance)
#    The apps connect to it via DATABASE_URL in their .env files

# 2. Configure environment files
cp gateway/.env.example gateway/.env
cp dashboard/.env.example dashboard/.env
# Edit both .env files with your API keys, DATABASE_URL, and secrets

# 3. Start the Gateway (terminal 1)
cd gateway && npm ci && npm run dev   # → http://localhost:3000

# 4. Start the Dashboard (terminal 2)
cd dashboard && npm ci && npm run dev # → http://localhost:3001

# 5. Create your first API key
curl http://localhost:3000/admin/keys \\
  -H "Authorization: Bearer \$ADMIN_API_KEY" \\
  -H "Content-Type: application/json" \\
  -d '{"user_id": "my-app", "provider": "openai", "label": "Main app"}'

# 6. Open the dashboard at http://localhost:3001
\`\`\`

### Production deployment

For production, use Docker Compose:

\`\`\`bash
docker compose up --build -d
\`\`\`

## Features

- **Multi-provider** — OpenAI, Anthropic, OpenRouter, Ollama + any OpenAI-compatible endpoint. New providers added via YAML config, no code changes needed.
- **Usage logging** — Every request logged to PostgreSQL + JSONL files
- **Cost tracking** — Automatic cost estimation per request with configurable pricing
- **Rate limiting** — Sliding-window rate limiter with per-user limits
- **Alerts** — Threshold-based alerts for spend, tokens, and error rates with webhook support
- **Analytics dashboard** — Real-time charts, user drill-downs, model breakdowns, raw logs
- **CSV export** — Download filtered usage data
- **OIDC/SSO** — Optional SSO login for the dashboard
- **Auto-migrations** — Database schema applied on startup
- **Admin seeding** — Admin user created automatically from env vars

## Documentation

See each application's README for detailed documentation:

- [Gateway README](./gateway/README.md) — API reference, environment variables, provider config, production deployment
- [Dashboard README](./dashboard/README.md) — Pages, API routes, design system, authentication, production deployment

## Tech stack

| Layer | Technology |
|---|---|
| Gateway framework | [Hono](https://hono.dev/) + \`@hono/node-server\` |
| Dashboard framework | [Next.js 15](https://nextjs.org/) (App Router) |
| UI components | React 19 + [Tailwind CSS](https://tailwindcss.com/) |
| Charts | [Recharts](https://recharts.org/) |
| Database | PostgreSQL 17 + [Drizzle ORM](https://orm.drizzle.team/) |
| Auth (dashboard) | [NextAuth.js](https://next-auth.js/) v4 |
| Testing | [Vitest](https://vitest.dev/) |
| Containerisation | Docker + Docker Compose |`;

        // Wait for CSS to load then render
        setTimeout(() => {
            const html = marked.parse(readmeMd);

            // Set view mode content
            document.getElementById('view-mode').innerHTML = html;

            // Set edit mode content (same HTML, but inside ql-editor)
            document.getElementById('edit-mode').innerHTML = html;
        }, 500);
    </script>
</body>

</html>
