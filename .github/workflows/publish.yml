name: Build and Publish

on:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch so we don't
# publish duplicate releases if a new commit arrives quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The built-in GITHUB_TOKEN needs write permission on contents
# so we can push version-bump commits, create tags, and publish
# releases.
permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1  –  Version
  # ────────────────────────────────────────────────────────────────
  # Reads the current version from package.json and increments the
  # patch number.  No files are modified – the new version is
  # passed to downstream jobs as an output.
  # ────────────────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Bump patch version
        id: bump
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $major, $minor, $patch = $version.Split('.')
          $newVersion = "$major.$minor.$([int]$patch + 1)"
          "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  # ────────────────────────────────────────────────────────────────
  # Job 2  –  Build  (matrix across Windows, macOS, Linux)
  # ────────────────────────────────────────────────────────────────
  # Each runner:
  #   1. Writes the new version into package.json / tauri.conf.json
  #      / Cargo.toml so the build picks it up.
  #   2. Installs the platform-native system dependencies (webkit,
  #      GTK, MinGW, …).
  #   3. Installs Node, Rust, and their caches.
  #   4. Runs `npm ci && npx tauri build`.
  #   5. Uploads platform-specific installer artifacts.
  # ────────────────────────────────────────────────────────────────
  build:
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      # ── Write new version into source files (local only) ──
      - name: Write new version into source files
        shell: pwsh
        run: |
          $newVer = "$env:NEW_VERSION"

          # package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $newVer
          $pkg | ConvertTo-Json -Depth 32 | Set-Content package.json -Encoding utf8NoBOM

          # tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $newVer
          $tauri | ConvertTo-Json -Depth 32 | Set-Content src-tauri/tauri.conf.json -Encoding utf8NoBOM

          # Cargo.toml
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = "[\d.]+"', "version = `"$newVer`"" | Set-Content src-tauri/Cargo.toml -Encoding utf8NoBOM
        env:
          NEW_VERSION: ${{ needs.version.outputs.new_version }}

      # ── Linux system dependencies ──
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            rpm

      # ── Windows MinGW toolchain (provides dlltool.exe) ──
      - name: Install w64devkit (MinGW on Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/skeeto/w64devkit/releases/download/v2.8.0/w64devkit-x64-2.8.0.7z.exe"
          $exe = "$env:TEMP\w64devkit.exe"
          Invoke-WebRequest -Uri $url -OutFile $exe
          & $exe -o"C:\tools\w64devkit" -y
          "C:\tools\w64devkit\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ── Node.js ──
      - name: Setup Node.js and npm cache
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # ── Rust toolchain ──
      - name: Install Rust (GNU target on Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          rustup default stable-x86_64-pc-windows-gnu
          rustup target add x86_64-pc-windows-gnu

      - name: Install Rust (macOS / Linux)
        if: matrix.os != 'windows-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Build ──
      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        run: npx tauri build --no-bundle

      - name: Bundle with default config
        run: npx tauri bundle

      - name: Bundle with Microsoft Store config (offline WebView2)
        if: matrix.os == 'windows-latest'
        run: npx tauri bundle --config src-tauri/tauri.microsoftstore.conf.json

      # ── Upload platform artifacts ──
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/**/*.app
          if-no-files-found: warn

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────
  # Job 3  –  Release
  # ────────────────────────────────────────────────────────────────
  # After ALL builds succeed:
  #   1. Writes the new version into source files.
  #   2. Commits the version bump (with [skip ci] to avoid
  #      re-triggering this pipeline).
  #   3. Tags the commit with v<new_version> and pushes both.
  #   4. Downloads every artifact produced by the build matrix.
  #   5. Creates a GitHub Release with all installers attached.
  # ────────────────────────────────────────────────────────────────
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Write new version (same script as in the build job) ──
      - name: Write new version into source files
        shell: pwsh
        run: |
          $newVer = "$env:NEW_VERSION"

          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $newVer
          $pkg | ConvertTo-Json -Depth 32 | Set-Content package.json -Encoding utf8NoBOM

          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $newVer
          $tauri | ConvertTo-Json -Depth 32 | Set-Content src-tauri/tauri.conf.json -Encoding utf8NoBOM

          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = "[\d.]+"', "version = `"$newVer`"" | Set-Content src-tauri/Cargo.toml -Encoding utf8NoBOM
        env:
          NEW_VERSION: ${{ needs.version.outputs.new_version }}

      # ── Commit & tag ──
      - name: Commit version bump and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "Bump version to v${{ needs.version.outputs.new_version }} [skip ci]"
          git tag "v${{ needs.version.outputs.new_version }}"

      - name: Push version-bump commit and tag
        run: |
          git push origin HEAD:refs/heads/main
          git push origin "v${{ needs.version.outputs.new_version }}"

      # ── Release ──
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body: |
            ## Esuyo Markdown v${{ needs.version.outputs.new_version }}

            Automated release built from commit `${{ github.sha }}`.
          files: release-artifacts/**/*
          make_latest: true
          generate_release_notes: true

      # ── GitHub Pages (direct download URL for Microsoft Store) ──
      - name: Prepare GitHub Pages download folder
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.new_version }}"
          $installer = Get-ChildItem -Path "release-artifacts/artifacts-windows" -Filter "*setup.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            Write-Warning "No NSIS installer found in artifacts"
            exit 1
          }

          # Create versioned download folder
          New-Item -Path "pages/download/v$version" -ItemType Directory -Force | Out-Null
          Copy-Item $installer.FullName "pages/download/v$version/$($installer.Name)"

          # Also copy as latest (version-agnostic URL)
          Copy-Item $installer.FullName "pages/download/$($installer.Name)" -Force

          Write-Host "Pages folder structure:"
          Get-ChildItem -Path "pages/download" -Recurse -File

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          destination_dir: ./
          keep_files: true
